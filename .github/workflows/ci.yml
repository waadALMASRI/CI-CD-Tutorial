# ============================================================
# .github/workflows/ci.yml — Your CI Pipeline
# ============================================================
# This is what GitHub Actions reads. When you push code or
# open a pull request, GitHub spins up a fresh virtual machine,
# installs Python and your dependencies, and runs your tests.
#
# If the tests pass  → green checkmark ✓
# If any test fails  → red X, pipeline stops, you get notified
# ============================================================

name: CI Pipeline

# TRIGGER: When does this pipeline run?
on:
  push:
    branches: [main]          # Runs on every push to main
  pull_request:
    branches: [main]          # Runs on every PR targeting main

# PERMISSIONS: GitHub Pages needs these to deploy
permissions:
  contents: read
  pages: write
  id-token: write

# JOBS: What work does the pipeline do?
jobs:
  # ===========================================================
  # STAGE 1: BUILD AND TEST (CI)
  # ===========================================================
  # This is the same CI job that also
  # generates an HTML coverage report and saves it as an
  # "artifact" — a file that the deploy stage can pick up.
  # ===========================================================
  build-and-test:
    runs-on: ubuntu-latest    # Use a fresh Ubuntu VM

    steps:
      # Step 1: Download your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python (the runtime)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Upgrade pip (the package manager itself)
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Step 4: Install dependencies from requirements.txt
      #         This is the PACKAGE MANAGER in action!
      #         "pip install" reads requirements.txt and
      #         installs pytest + pytest-cov
      - name: Install dependencies
        run: pip install -r requirements.txt

      # # Step 5: Run the TEST SUITE
      # #         "pytest" auto-discovers every file matching
      # #         test_*.py and runs every function starting
      # #         with test_
      # - name: Run tests
      #   run: pytest -v

      # # Step 6 (bonus): Run tests WITH coverage report
      # #         Shows what % of your code is tested.
      # #         --cov=src measures coverage of the src/ folder.
      # #         --cov-fail-under=80 fails if coverage < 80%.
      # - name: Run tests with coverage
      #   run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
      
      # Test Step 5 and 6 combined: Run tests with coverage report, but only show missing lines
      - name: Run tests with coverage
        run: pytest -v \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=html:coverage-report \
          --cov-fail-under=80

      # ARTIFACT: Save the HTML report so the deploy job can use it.
      # This is the "artefact" concept from Chapter 2 of your guide —
      # the output of one stage passed to the next stage.
      - name: Upload coverage report
        uses: actions/upload-pages-artifact@v3
        with:
          name: coverage-report/

  # ===========================================================
  # STAGE 2: DEPLOY TO GITHUB PAGES (CD)
  # ===========================================================
  # This job ONLY runs if:
  #   1. build-and-test passed (needs: build-and-test)
  #   2. The push was to the main branch (not a PR)
  #
  # It takes the HTML coverage report artifact from Stage 1
  # and publishes it to GitHub Pages.
  # ===========================================================
  deploy:
    needs: build-and-test     # Only run if build-and-test succeeded
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Only run on pushes to main
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4